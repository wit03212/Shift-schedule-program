<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเปลี่ยนรอบการทำงาน</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<button class="toggle-dark" onclick="toggleDark()">
Dark Mode
</button>

<div class="card">

<h2>แบบฟอร์มเปลี่ยนรอบการทำงาน</h2>

<form id="form">

<!-- รหัสพนักงาน -->
<input type="text" id="empId" placeholder="รหัสพนักงาน" required>

<!-- ชื่อ -->
<input type="text" id="fullName" placeholder="ชื่อ-นามสกุล" required>

<!-- แผนก -->
<select id="department" required>
  <option value="">เลือกแผนก</option>
  <option>ผลิต</option>
  <option>QC</option>
  <option>คลังสินค้า</option>
  <option>ซ่อมบำรุง</option>
</select>

<hr>

<!-- วันที่ + รอบเดิม -->
<label>วันที่รอบเดิม</label>
<input type="date" id="oldDate" required>

<select id="oldShift" required>
  <option value="">รอบการทำงานเดิม</option>
  <option>A</option>
  <option>B</option>
  <option>C</option>
</select>

<hr>

<!-- วันที่ + รอบใหม่ -->
<label>วันที่รอบใหม่</label>
<input type="date" id="newDate" required>

<select id="newShift" required>
  <option value="">รอบการทำงานใหม่</option>
  <option>A</option>
  <option>B</option>
  <option>C</option>
</select>

<hr>

<!-- เหตุผล -->
<textarea
id="reason"
placeholder="เหตุผลในการเปลี่ยนรอบงาน"
rows="5"
required></textarea>

<!-- ปุ่ม -->
<button type="submit">บันทึกข้อมูล</button>

</form>

<p id="result"></p>

</div>

</div>

<!-- config + script -->
<script src="config.js"></script>
<script src="script.js"></script>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
