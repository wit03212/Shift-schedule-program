<!DOCTYPE html>
<div class="header">
  <h2>เปลี่ยนรอบการทำงาน</h2>
  <p class="subtitle">
กรอกข้อมูลเพื่อส่งคำขอเปลี่ยนรอบการทำงาน
</p>
</div>

<form id="form">

<input type="text" id="empId" placeholder="รหัสพนักงาน" required>

<input type="text" id="fullName" placeholder="ชื่อ-นามสกุล" required>

<select id="department" required>
  <option value="">เลือกแผนก</option>
  <option>ผลิต</option>
  <option>QC</option>
  <option>คลังสินค้า</option>
  <option>ซ่อมบำรุง</option>
</select>

<hr>

<label>วันที่รอบเดิม</label>
<input type="date" id="oldDate" required>

<select id="oldShift" required>
  <option value="">รอบการทำงานเดิม</option>
  <option>A</option>
  <option>B</option>
  <option>C</option>
</select>

<hr>

<label>วันที่รอบใหม่</label>
<input type="date" id="newDate" required>

<select id="newShift" required>
  <option value="">รอบการทำงานใหม่</option>
  <option>A</option>
  <option>B</option>
  <option>C</option>
</select>

<hr>

<textarea
id="reason"
placeholder="เหตุผลในการเปลี่ยนรอบการทำงาน"
rows="5"
required></textarea>

<button type="submit" class="submit-btn">
บันทึกข้อมูล
</button>

</form>

<p id="result"></p>

</div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
