<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบเปลี่ยนรอบการทำงาน</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

<div class="top-title">

<div class="logo-circle">
<i class="fa-solid fa-calendar-days"></i>
</div>

<h1>เปลี่ยนรอบการทำงาน</h1>

<p>
กรอกข้อมูลเพื่อส่งคำขอเปลี่ยนรอบการทำงาน
</p>

</div>

<div class="card">

<form id="form">

<!-- section -->
<div class="section">

<div class="section-title blue">
<i class="fa-regular fa-user"></i>
ข้อมูลพนักงาน
</div>

<div class="grid-3">

<div class="input-box">
<i class="fa-regular fa-id-card"></i>
<input
type="text"
id="empId"
placeholder="รหัสพนักงาน"
required
>
</div>

<div class="input-box">
<i class="fa-regular fa-user"></i>
<input
type="text"
id="fullName"
placeholder="ชื่อ-นามสกุล"
required
>
</div>

<div class="input-box">

<i class="fa-regular fa-building"></i>

<select id="department" required>
<option value="">เลือกแผนก</option>
<option>ผลิต</option>
<option>QC</option>
<option>คลังสินค้า</option>
<option>ซ่อมบำรุง</option>
</select>

</div>

</div>
</div>

<!-- section -->
<div class="section light-blue">

<div class="section-title blue">
<i class="fa-regular fa-calendar"></i>
วันที่รอบเดิม
</div>

<div class="grid-2">

<div class="input-box">
<input type="date" id="oldDate" required>
</div>

<div class="input-box">

<select id="oldShift" required>
<option value="">รอบการทำงานเดิม</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

</div>

</div>
</div>

<!-- section -->
<div class="section light-green">

<div class="section-title green">
<i class="fa-regular fa-calendar-check"></i>
วันที่รอบใหม่
</div>

<div class="grid-2">

<div class="input-box">
<input type="date" id="newDate" required>
</div>

<div class="input-box">

<select id="newShift" required>
<option value="">รอบการทำงานใหม่</option>
<option>A</option>
<option>B</option>
<option>C</option>
</select>

</div>

</div>
</div>

<!-- section -->
<div class="section light-purple">

<div class="section-title purple">
<i class="fa-regular fa-pen-to-square"></i>
เหตุผลในการเปลี่ยนรอบงาน
</div>

<textarea
id="reason"
placeholder="กรุณาระบุเหตุผลในการเปลี่ยนรอบงาน..."
rows="6"
required></textarea>

</div>

<button type="submit" class="submit-btn">

<i class="fa-regular fa-floppy-disk"></i>

บันทึกข้อมูล

</button>

<p class="footer-text">
<i class="fa-solid fa-lock"></i>
ข้อมูลของท่านจะถูกเก็บเป็นความลับ
</p>

<p id="result"></p>

</form>

</div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
