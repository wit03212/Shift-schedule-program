<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shift Dashboard</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

<!-- TITLE -->
<div class="top-title">
  <div class="logo-circle">
    <i class="fa-solid fa-calendar-days"></i>
  </div>
  <h1>ระบบเปลี่ยนรอบการทำงาน</h1>
  <p>Dashboard Management</p>
</div>

<!-- ================= FORM ================= -->
<div class="card">

<form id="form">

  <div class="section">

    <div class="section-title blue">ข้อมูลพนักงาน</div>

    <div class="grid-3">

      <input type="text" id="empId" placeholder="รหัสพนักงาน" required>
      <input type="text" id="fullName" placeholder="ชื่อ-นามสกุล" readonly>
      <input type="text" id="department" placeholder="แผนก" readonly>

    </div>

  </div>

  <div class="grid-2">

    <input type="date" id="oldDate" required>
    <select id="oldShift" required>
      <option value="">รอบเดิม</option>
      <option>A</option><option>B</option><option>C</option>
    </select>

  </div>

  <div class="grid-2">

    <input type="date" id="newDate" required>
    <select id="newShift" required>
      <option value="">รอบใหม่</option>
      <option>A</option><option>B</option><option>C</option>
    </select>

  </div>

  <textarea id="reason" rows="4" placeholder="เหตุผล"></textarea>

  <button type="submit" class="submit-btn">บันทึกข้อมูล</button>

</form>

</div>

<!-- ================= DASHBOARD ================= -->
<div class="dashboard">

  <div class="dash-card">
    <h3>คำขอทั้งหมด</h3>
    <p id="totalRequest">0</p>
  </div>

  <div class="summary-card">
    <h3>เดือนนี้</h3>
    <p id="monthlyTotal">0</p>
  </div>

</div>

<!-- ================= CHART ================= -->
<div class="chart-box">

  <h2>สถิติการเปลี่ยนรอบ</h2>
  <canvas id="shiftChart"></canvas>

</div>

<!-- ================= SEARCH + TABLE (แยกจาก FORM แล้ว) ================= -->
<div class="history-box">

  <div class="history-header">

    <h2>ประวัติการส่งคำขอ</h2>

    <input type="text" id="searchInput" placeholder="ค้นหา...">

  </div>

  <div class="table-wrapper">

    <table>

      <thead>
        <tr>
          <th>รหัส</th>
          <th>ชื่อ</th>
          <th>แผนก</th>
          <th>รอบเดิม</th>
          <th>รอบใหม่</th>
        </tr>
      </thead>

      <tbody id="historyTable"></tbody>

    </table>

  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
